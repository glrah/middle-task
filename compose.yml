services:
  back:
    build: .
    container_name: entryTracker-app
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - entryTracker_network

  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: entryTracker-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3366:3306"
    networks:
      - entryTracker_network
    volumes:
      - db-data:/var/lib/mysql

networks:
  entryTracker_network:

volumes:
  db-data:
